kind = "web"
previewPath = "/"
title = "EstateVista — Real Estate Platform"
version = "1.0.0"
id = "artifacts/real-estate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20263

[services.development]
run = "pnpm --filter @workspace/real-estate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/real-estate", "run", "build" ]
publicDir = "artifacts/real-estate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20263"
BASE_PATH = "/"
